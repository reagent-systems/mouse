name: Native build

# Builds the Capacitor iOS and Android apps unsigned (no secrets) to verify
# they compile. Capacitor 8 fixes the supported build toolchain (JDK 21 for the
# Android library; Xcode 16 / Swift for iOS), so the matrix uses those. The
# produced apps still target a wide range of OS versions: Android minSdk 24 →
# compile/target 36 (API 24–36) and iOS deployment target 15.0+.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Capacitor 8's Android library is compiled at Java 21, so JDK 21 is
        # required (JDK 17 fails with "invalid source release: 21").
        java: ['21']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform/build-tools
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle + sync Capacitor
        run: |
          npm run build
          npx cap sync android

      - name: Gradle assemble (debug + unsigned release)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleDebug assembleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks-jdk${{ matrix.java }}
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

  ios:
    name: iOS (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # Capacitor 8's Swift requires Xcode 16+. macos-15 ships it; macos-14
        # (Xcode 15.4) fails to compile @capacitor/app, so it is excluded.
        runner: [macos-15]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Show Xcode / SDK version
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep -i ios || true

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle + sync Capacitor
        run: |
          npm run build
          npx cap sync ios

      - name: Build app for iOS Simulator (unsigned)
        run: |
          xcodebuild build \
            -project ios/App/App.xcodeproj \
            -target App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
