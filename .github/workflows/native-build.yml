name: Native build

# Builds the Capacitor iOS and Android apps across several toolchain / OS
# versions. iOS simulator builds and Android debug/release builds need no
# signing secrets, so they run unsigned purely to verify the apps compile.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Cover the JDKs Capacitor 8 / AGP support. minSdk 24, target/compile 36.
        java: ['17', '21']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform/build-tools
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle + sync Capacitor
        run: |
          npm run build
          npx cap sync android

      - name: Gradle assemble (debug + unsigned release)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleDebug assembleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks-jdk${{ matrix.java }}
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

  ios:
    name: iOS (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # Each macOS image ships a different Xcode / iOS SDK, so this matrix
        # compiles the app against multiple iOS SDK versions.
        runner: [macos-14, macos-15]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Show Xcode / SDK version
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep -i ios || true

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle + sync Capacitor
        run: |
          npm run build
          npx cap sync ios

      - name: Build app for iOS Simulator (unsigned)
        run: |
          xcodebuild build \
            -project ios/App/App.xcodeproj \
            -target App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
